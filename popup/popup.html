<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WhatsApp PP Toggler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>WhatsApp Settings</h2>
    
    <div class="setting-row toggle-container">
      <span class="label">Modify Profile Pictures</span>
      <label class="switch">
        <input type="checkbox" id="pp-toggle">
        <span class="slider round"></span>
      </label>
    </div>

    <div class="setting-row mode-container" id="mode-settings">
      <span class="label">Effect Mode:</span>
      <div class="radio-group">
        <label>
          <input type="radio" name="effectMode" value="hide">
          Hide Completely (Empty Space)
        </label>
        <label>
          <input type="radio" name="effectMode" value="replace">
          Default WhatsApp Icon
        </label>
      </div>
    </div>
  </div>
  
  <!-- Load the shared storage module -->
  <script src="../utils/storage.js"></script>
  <!-- Load the popup logic -->
  <script src="popup.js"></script>
</body>
</html>
